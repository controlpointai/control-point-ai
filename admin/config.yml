backend:
  name: github
  repo: controlpointai/control-point-ai
  branch: main
  base_url: https://ix3npuhheyrpipt5dyr4va7vgq0ttlnf.lambda-url.us-east-2.on.aws
  auth_endpoint: auth

local_backend: true

publish_mode: editorial_workflow
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

site_url: "https://controlpointai.org"
display_url: "https://controlpointai.org"
logo_url: "/assets/images/controlpointai-admin-logo-transparent.png"

collections:
  - name: "insights"
    label: "Insights"
    label_singular: "Insight"
    folder: "content/insights"
    create: true
    slug: "{{fields.id}}"
    summary: "{{fields.label}} - {{title}}"
    sortable_fields: ["order", "publish_date", "title", "topic"]
    fields:
      - { label: "Post ID", name: "id", widget: "string", hint: "Use a short unique ID, such as ai11. This becomes the article URL query value." }
      - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1, hint: "Use the issue number. The archive sorts newest first by default." }
      - { label: "Label", name: "label", widget: "string", default: "Issue 11" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "publish_date", widget: "datetime", required: false, hint: "Optional. Future-dated posts stay hidden until a scheduled deploy runs after this time." }
      - label: "Topic"
        name: "topic"
        widget: "select"
        options:
          - { label: "Runtime authority", value: "runtime" }
          - { label: "Operations", value: "operations" }
          - { label: "Analysis", value: "analysis" }
          - { label: "Interface", value: "interface" }
      - { label: "Featured Image", name: "image", widget: "image", required: false, default: "/assets/images/uploads/newsletter-authority-engineering.jpg" }
      - { label: "Summary", name: "summary", widget: "text", hint: "Buyer-facing archive summary. Keep this concise." }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "case_studies"
    label: "Case Studies"
    label_singular: "Case Study"
    folder: "content/case-studies"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    preview_path: "case-studies/{{fields.live_path}}/index.html"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Live Page Path", name: "live_path", widget: "string", required: false, hint: "Public URL folder under /case-studies/. Existing examples: runtime-authority-enforcement, unauthorized-concept-drift, context-disruption-ui-intervention." }
      - label: "Status"
        name: "status"
        widget: "select"
        default: "draft"
        options:
          - { label: "Draft", value: "draft" }
          - { label: "Featured", value: "featured" }
          - { label: "Archived", value: "archived" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Failure Pattern", name: "failure_pattern", widget: "string", required: false }
      - { label: "What ControlPointAI Would Map", name: "mapping_focus", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
