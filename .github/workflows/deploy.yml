name: Deploy site to S3 and CloudFront

on:
  push:
    branches:
      - main
  schedule:
    # Rebuild hourly so future-dated Decap posts appear after their publish time.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::953199921486:role/controlpointai-role
          aws-region: us-east-2

      - name: Build generated content
        run: npm run build

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://control-point-ai-bucket --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "README.md" \
            --exclude "content/*" \
            --exclude "scripts/*" \
            --exclude "package.json"

      - name: Publish directory index objects
        run: |
          set -euo pipefail

          BUCKET="control-point-ai-bucket"
          pages=(
            "admin"
            "case-studies"
            "case-studies/context-disruption-ui-intervention"
            "case-studies/runtime-authority-enforcement"
            "case-studies/unauthorized-concept-drift"
            "contact"
            "demo"
            "insights"
            "insights/post"
            "mission"
            "services"
          )

          for page in "${pages[@]}"; do
            aws s3api put-object \
              --bucket "$BUCKET" \
              --key "$page/" \
              --body "$page/index.html" \
              --content-type "text/html; charset=utf-8" \
              --cache-control "public, max-age=0, must-revalidate" >/dev/null
            aws s3api put-object \
              --bucket "$BUCKET" \
              --key "$page" \
              --body "$page/index.html" \
              --content-type "text/html; charset=utf-8" \
              --cache-control "public, max-age=0, must-revalidate" >/dev/null
          done

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3BX9NW5W3KZEA \
            --paths "/*"
