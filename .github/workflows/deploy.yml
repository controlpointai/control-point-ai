name: Deploy site to S3 and CloudFront

on:
  push:
    branches:
      - main
  schedule:
    # Rebuild hourly so future-dated Decap posts appear after their publish time.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::953199921486:role/controlpointai-role
          aws-region: us-east-2

      - name: Build generated content
        run: npm run build

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://control-point-ai-bucket --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "README.md" \
            --exclude "content/*" \
            --exclude "scripts/*" \
            --exclude "package.json"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3BX9NW5W3KZEA \
            --paths "/*"
