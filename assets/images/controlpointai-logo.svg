<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 47" role="img" aria-labelledby="title">
  <title id="title">ControlPointAI logo</title>
  <foreignObject width="42" height="47">
    <div xmlns="http://www.w3.org/1999/xhtml" class="brand-mark" aria-hidden="true">
      <style>
        .brand-mark {
          position: relative;
          width: 42px;
          height: 47px;
          display: flex;
          align-items: center;
          justify-content: center;
          color: #061426;
          font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
          font-size: 20px;
          font-weight: 900;
          font-style: italic;
          line-height: 1;
          isolation: isolate;
          gap: 0;
        }

        .brand-mark .mark-c,
        .brand-mark .mark-p {
          position: relative;
          display: inline-block;
        }

        .brand-mark .mark-c {
          transform: translate(4px, -3px);
        }

        .brand-mark .mark-p {
          transform: translate(-2px, 1px);
        }

        .brand-mark::before,
        .brand-mark::after {
          content: "";
          position: absolute;
          inset: 0;
          clip-path: polygon(50% 4%, 88% 16%, 83% 63%, 50% 94%, 17% 63%, 12% 16%);
          z-index: -2;
        }

        .brand-mark::before {
          background: #061426;
        }

        .brand-mark::after {
          inset: 2px;
          background: #fbfcfe;
          z-index: -1;
        }
      </style>
      <span class="mark-c">C</span><span class="mark-p">P</span>
    </div>
  </foreignObject>
</svg>
